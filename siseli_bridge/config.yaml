name: 'Siseli Inverter Bridge PS4Z'
description: 'Local bridge for Siseli-compatible inverters with MQTT discovery for Home Assistant.'
version: '2.5.31'
slug: 'siseli_bridge_ps4z'
url: 'https://github.com/fedora144/siseli-ha/blob/main/README.md'
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: 'application'
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
apparmor: false

options:
  MQTT_HOST: 'core-mosquitto'
  MQTT_PORT: 1883
  MQTT_USER: ''
  MQTT_PASSWORD: ''

  TARGET_HOST: '8.212.18.157'
  TARGET_PORT: 1883
  LISTEN_PORT: 18899

  INVERTER_IP: '192.168.1.139'
  ROUTER_IP: '192.168.1.1'
  INVERTER_MAC: ''
  ROUTER_MAC: ''
  AUTO_INTERCEPT: true

  MQTT_DISCOVERY_PREFIX: 'homeassistant'
  DEVICE_ID: 'siseli_inverter_1'
  DEVICE_NAME: 'Siseli Inverter 1'
  MODEL_NAME: 'Siseli Inverter 1'
  MANUFACTURER: 'Siseli Compatible'
  ENTITY_PREFIX: 'Siseli'
  INVERTER_COUNT: 1
  BATTERY_COUNT: 1
  BATTERY_CAPACITY_PER_BATTERY_AH: 0.0

  STATE_TOPIC: 'siseli/siseli_inverter_1/state'
  AVAILABILITY_TOPIC: 'siseli/siseli_inverter_1/availability'
  SNIFF_IFACE: ''
  LOG_VERBOSE: true
  LOG_LEVEL: 'info'
  UPDATE_INTERVAL_SEC: 10
  MQTT_RETAIN: true

schema:
  MQTT_HOST: str
  MQTT_PORT: int
  MQTT_USER: str?
  MQTT_PASSWORD: password?

  TARGET_HOST: str
  TARGET_PORT: int
  LISTEN_PORT: int

  INVERTER_IP: str
  ROUTER_IP: str
  INVERTER_MAC: str?
  ROUTER_MAC: str?
  AUTO_INTERCEPT: bool

  MQTT_DISCOVERY_PREFIX: str
  DEVICE_ID: str
  DEVICE_NAME: str
  MODEL_NAME: str
  MANUFACTURER: str
  ENTITY_PREFIX: str?
  INVERTER_COUNT: int(1,32)
  BATTERY_COUNT: int(1,64)
  BATTERY_CAPACITY_PER_BATTERY_AH: float(0,)

  STATE_TOPIC: str
  AVAILABILITY_TOPIC: str
  SNIFF_IFACE: str?
  LOG_VERBOSE: bool
  LOG_LEVEL: list(debug|info|warning|error)
  UPDATE_INTERVAL_SEC: int(0,)
  MQTT_RETAIN: bool




